<div class="container mt-5 pb-5">
  <div class="d-flex justify-content-between align-items-end mb-4">
    <div>
      <h2 class="fw-bold text-dark mb-1">Applicant Management</h2>
      <p class="text-muted small mb-0"><i class="fas fa-info-circle me-1"></i> Manage and review all job applications</p>
    </div>
    <button class="btn btn-outline-secondary btn-sm shadow-sm px-3" (click)="downloadApplicantReport()">
      <i class="fas fa-download me-2"></i>Export Report
    </button>
  </div>

  <div class="card border-0 shadow-sm rounded-4 mb-5" style="background-color: #fcfcfc; border: 1px solid #eee !important;">
    <div class="card-body p-4">
      <form (ngSubmit)="addApplicant()" #applicantForm="ngForm" class="row g-3">
        <div class="col-md-4">
          <label class="form-label small fw-bold text-secondary">Full Name</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text bg-white border-end-0 text-muted"><i class="far fa-user"></i></span>
            <input type="text" class="form-control border-start-0 ps-0 shadow-none" [(ngModel)]="newApplicant.fullName" name="fullName" required>
          </div>
        </div>

        <div class="col-md-4">
          <label class="form-label small fw-bold text-secondary">Email Address</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text bg-white border-end-0 text-muted"><i class="far fa-envelope"></i></span>
            <input type="email" class="form-control border-start-0 ps-0 shadow-none" [(ngModel)]="newApplicant.email" name="email" required>
          </div>
        </div>

        <div class="col-md-3">
          <label class="form-label small fw-bold text-secondary">Phone</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text bg-white border-end-0 text-muted"><i class="fas fa-phone-alt"></i></span>
            <input type="text" class="form-control border-start-0 ps-0 shadow-none" [(ngModel)]="newApplicant.phone" name="phone" required>
          </div>
        </div>

        <div class="col-md-1 d-flex align-items-end">
          <button type="submit" class="btn btn-primary btn-sm w-100 shadow-sm fw-bold" [disabled]="!applicantForm.valid">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead style="background-color: #f8f9fc;">
          <tr class="text-secondary small text-uppercase">
            <th class="ps-4 py-3 border-0">ID</th>
            <th class="border-0">Applicant Name</th>
            <th class="border-0">Contact Info</th>
            <th class="border-0 text-center">Status</th>
            <th class="border-0 text-end pe-4">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (a of applicants(); track a.id) {
            <tr style="border-bottom: 1px solid #f1f1f1;">
              <td class="ps-4 text-muted small">#{{a.id}}</td>
              <td><div class="fw-bold text-dark">{{a.fullName}}</div></td>
              <td>
                <div class="small text-dark">{{a.email}}</div>
                <div class="text-muted small"><i class="fas fa-phone-alt me-1"></i>{{a.phone}}</div>
              </td>
              <td class="text-center">
                <span class="badge px-3 py-2 fw-medium rounded-pill" 
                      [style.background-color]="a.status === 'SELECTED' ? '#e8f5e9' : a.status === 'REJECTED' ? '#ffebee' : '#f5f5f5'"
                      [style.color]="a.status === 'SELECTED' ? '#2e7d32' : a.status === 'REJECTED' ? '#c62828' : '#616161'">
                  {{a.status || 'Pending'}}
                </span>
              </td>
              <td class="text-end pe-4">
                <div class="d-flex justify-content-end gap-2">
                  <button class="btn btn-light btn-sm text-success border px-2" (click)="changeStatus(a.id!, 'SELECTED')"><i class="fas fa-check"></i></button>
                  <button class="btn btn-light btn-sm text-danger border px-2" (click)="changeStatus(a.id!, 'REJECTED')"><i class="fas fa-times"></i></button>
                  <button class="btn btn-link text-muted btn-sm" (click)="deleteApplicant(a.id!)"><i class="far fa-trash-alt"></i></button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5" class="text-center py-5">
                <p class="text-muted small">No applicants found in the records.</p>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
