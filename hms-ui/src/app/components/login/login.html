<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>🔐 EMS Login</h1>
      <p>Employee Management System</p>
    </div>

    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username"
          class="form-control"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter username"
          required
          [disabled]="loading">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter password"
          required
          [disabled]="loading">
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div class="demo-section">
      <p class="demo-title">Quick Login:</p>
      <div class="demo-buttons">
        <button type="button" class="btn btn-outline-info" (click)="loginAsUser()" [disabled]="loading">
          👤 User
        </button>
        <button type="button" class="btn btn-outline-warning" (click)="loginAsAdmin()" [disabled]="loading">
          ⚙️ Admin
        </button>
      </div>
    </div>

    <table class="demo-table">
      <thead>
        <tr>
          <th>Role</th>
          <th>Username</th>
          <th>Password</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>👤 User</td>
          <td><code>user</code></td>
          <td><code>user</code></td>
        </tr>
        <tr>
          <td>⚙️ Admin</td>
          <td><code>admin</code></td>
          <td><code>admin</code></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
